<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f7f4ee"/>
<title>가만히 · gamanhi</title>
<script src="https://cdn.jsdelivr.net/npm/ably@2/ably.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+KR:wght@300;400&display=swap');

  :root {
    --celadon:      #A8BDB2;
    --celadon-mid:  #7da89a;
    --celadon-deep: #4e7d72;
    --blossom:      #ddb8be;
    --blossom-pale: #f0e0e3;
    --ivory:        #f7f4ee;
    --ivory-warm:   #ede9e0;
    --songzio:      #1e1e1c;
    --ink:          #2C2C2A;
    --ink-faint:    rgba(44,44,42,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; touch-action:none; }

  html, body {
    width:100%; height:100%;
    background: var(--ivory);
    font-family: 'IM Fell English', Georgia, serif;
    overflow: hidden;
  }

  /* ── BACKGROUND ── */
  #bg {
    position:fixed; inset:0; z-index:0;
    background: var(--ivory);
  }

  #bg-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--celadon) 0.4px, transparent 0.4px),
      linear-gradient(90deg, var(--celadon) 0.4px, transparent 0.4px);
    background-size: 48px 48px;
    opacity: 0.09;
  }

  #bg-blossom {
    position:absolute; inset:0;
    pointer-events:none;
  }

  /* ── PETAL CANVAS ── */
  #petal-canvas {
    position:fixed; inset:0;
    pointer-events:none;
    z-index:1;
  }

  /* ── SCREENS ── */
  .screen {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:10;
    padding: 2rem 1.5rem;
    transition: opacity 0.7s ease;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  /* ── WORDMARK ── */
  .wordmark {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--ink);
    opacity: 0.35;
    margin-bottom: 3rem;
  }

  /* ── LOBBY ── */
  #lobby {
    gap: 0;
  }

  .lobby-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.12em;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .lobby-sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink);
    opacity: 0.4;
    letter-spacing: 0.06em;
    margin-bottom: 3.5rem;
  }

  .orb-small {
    width: 80px; height: 80px;
    border-radius: 50%;
    margin-bottom: 3rem;
    position: relative;
    flex-shrink: 0;
  }

  .orb-small-ring {
    position:absolute; inset:0;
    border-radius:50%;
    border: 0.8px solid var(--celadon);
    opacity:0.5;
  }

  .orb-small-fill {
    position:absolute; inset:8px;
    border-radius:50%;
    background: var(--celadon);
    opacity:0.25;
  }

  .orb-small-core {
    position:absolute; inset:20px;
    border-radius:50%;
    background: var(--celadon-mid);
    opacity:0.5;
  }

  .btn-row {
    display:flex; flex-direction:column;
    gap: 14px; align-items:center;
    width:100%;max-width:260px;
  }

  .btn {
    width:100%;
    padding: 14px 0;
    border-radius: 2px;
    font-family: 'IM Fell English', serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    cursor: pointer;
    border: 0.8px solid;
    transition: all 0.25s ease;
    background: transparent;
  }

  .btn-primary {
    border-color: var(--celadon-deep);
    color: var(--celadon-deep);
  }
  .btn-primary:hover { background: var(--celadon); color: var(--ivory); border-color: var(--celadon); }

  .btn-secondary {
    border-color: var(--ink-faint);
    color: var(--ink);
    opacity: 0.55;
  }
  .btn-secondary:hover { opacity: 1; border-color: var(--ink); }

  /* ── CODE SCREENS ── */
  .code-display {
    font-family: 'IM Fell English', serif;
    font-size: 48px;
    letter-spacing: 0.22em;
    color: var(--ink);
    opacity: 0.85;
    margin: 1.5rem 0;
  }

  .status-line {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink);
    opacity: 0.4;
    text-align: center;
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  #code-input {
    width: 200px;
    padding: 14px 0;
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-size: 32px;
    letter-spacing: 0.22em;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 0.8px solid var(--celadon);
    outline: none;
    text-transform: uppercase;
    margin-bottom: 2rem;
    touch-action: auto;
    user-select: auto;
    -webkit-user-select: auto;
  }

  #code-input::placeholder {
    opacity: 0.2;
    letter-spacing: 0.18em;
  }

  .back-link {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--ink);
    opacity: 0.3;
    cursor: pointer;
    margin-top: 1.5rem;
    padding: 8px;
  }
  .back-link:hover { opacity: 0.6; }

  /* ── MAIN PLAY SCREEN ── */
  #play { gap: 0; justify-content: space-between; padding: 3rem 2rem; }

  #play-header {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; margin-bottom:auto;
  }

  .play-wordmark {
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink);
    opacity: 0.22;
  }

  .session-code {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink);
    opacity: 0.22;
  }

  /* ── MAIN ORB ── */
  #orb-wrap {
    position:relative;
    width: min(280px, 72vw);
    height: min(280px, 72vw);
    flex-shrink:0;
    margin: auto 0;
  }

  #orb-outer-ring {
    position:absolute; inset:0;
    border-radius:50%;
    border: 0.8px solid var(--celadon);
    opacity:0.3;
    transition: opacity 2s ease, border-color 2s ease;
  }

  #orb-dashed {
    position:absolute; inset:-10px;
    border-radius:50%;
    border: 0.8px dashed var(--celadon);
    opacity:0.15;
    transition: opacity 2s ease;
  }

  #orb-mid-layer {
    position:absolute; inset:16px;
    border-radius:50%;
    background: var(--celadon);
    opacity:0.12;
    transition: opacity 2s ease, background 2s ease;
  }

  #orb-body {
    position:absolute; inset:32px;
    border-radius:50%;
    background: #c8d8d0;
    transition: background 2s ease, transform 5s cubic-bezier(0.45,0,0.55,1);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  #orb-core-glow {
    position:absolute; inset:0; border-radius:50%;
    background: var(--celadon-deep);
    opacity:0;
    transition: opacity 2s ease;
  }

  #orb-inner {
    position:absolute; inset:24px;
    border-radius:50%;
    background: var(--celadon-mid);
    opacity:0.55;
    transition: background 2s ease, transform 5s cubic-bezier(0.45,0,0.55,1), opacity 2s ease;
    display:flex; align-items:center; justify-content:center;
  }

  #orb-center-dot {
    width:10px; height:10px;
    border-radius:50%;
    background: var(--ivory);
    opacity:0.6;
    transition: opacity 1.5s;
  }

  #orb-blossom {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition: opacity 1.5s ease;
    pointer-events:none;
  }

  #sync-ring {
    position:absolute; inset:8px;
    border-radius:50%;
    border: 0px solid var(--celadon);
    opacity:0;
    transition: border-width 1s ease, opacity 1.5s ease, border-color 1.5s ease;
  }

  /* ── TOUCH ZONES ── */
  #touch-left, #touch-right {
    position:absolute;
    width:42%; height:58%;
    bottom:6%; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.5s ease;
  }
  #touch-left  { left:2%; }
  #touch-right { right:2%; }

  .touch-hint-circle {
    width:38px; height:38px;
    border-radius:50%;
    border: 0.8px solid var(--celadon);
    opacity:0.4;
    display:flex; align-items:center; justify-content:center;
    font-family:'IM Fell English', serif;
    font-size:11px;
    letter-spacing:0.06em;
    color: var(--ink);
    transition: opacity 0.5s, background 0.5s, border-color 0.5s;
  }

  .touch-hint-circle.active {
    background: var(--celadon);
    border-color: var(--celadon-deep);
    opacity: 0.9;
    color: var(--ivory);
  }

  /* ── BOTTOM STATUS ── */
  #play-footer {
    width:100%; margin-top:auto;
    display:flex; flex-direction:column; align-items:center;
    gap:6px;
  }

  #play-msg {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--ink);
    opacity:0.4;
    text-align:center;
    line-height:1.8;
    min-height:54px;
    transition: opacity 0.6s;
  }

  #sync-word {
    font-family: 'Noto Serif KR', serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--celadon-deep);
    opacity:0;
    min-height:18px;
    transition: opacity 0.8s;
  }

  /* ── PLAYER DOTS ── */
  #player-dots {
    display:flex; gap:12px; align-items:center;
    margin-top:6px;
  }

  .pdot {
    width:7px; height:7px;
    border-radius:50%;
    background: var(--celadon);
    opacity:0.2;
    transition: opacity 0.5s, background 0.5s;
  }
  .pdot.online { opacity:0.5; }
  .pdot.holding { opacity:1; background: var(--celadon-deep); }

  .pdot-sep {
    width:18px; height:0.5px;
    background: var(--celadon);
    opacity:0.2;
  }

  /* ── CONNECTED FLASH ── */
  #connect-flash {
    position:fixed; inset:0; z-index:100;
    background: var(--celadon);
    opacity:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
  }
  #connect-flash-text {
    font-family:'Noto Serif KR', serif;
    font-size:13px;
    letter-spacing:0.24em;
    color: var(--ivory);
    opacity:0.85;
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg">
  <div id="bg-grid"></div>
  <svg id="bg-blossom" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g opacity="0.06" transform="translate(60,140)">
      <ellipse rx="22" ry="11" fill="#ddb8be" transform="rotate(0) translate(0,-30)"/>
      <ellipse rx="22" ry="11" fill="#ddb8be" transform="rotate(72) translate(0,-30)"/>
      <ellipse rx="22" ry="11" fill="#c9a0a8" transform="rotate(144) translate(0,-30)"/>
      <ellipse rx="22" ry="11" fill="#c9a0a8" transform="rotate(216) translate(0,-30)"/>
      <ellipse rx="22" ry="11" fill="#ddb8be" transform="rotate(288) translate(0,-30)"/>
      <circle r="9" fill="#f0dde0"/>
    </g>
    <g opacity="0.04" transform="translate(320,280)">
      <ellipse rx="30" ry="15" fill="#ddb8be" transform="rotate(20) translate(0,-40)"/>
      <ellipse rx="30" ry="15" fill="#ddb8be" transform="rotate(92) translate(0,-40)"/>
      <ellipse rx="30" ry="15" fill="#c9a0a8" transform="rotate(164) translate(0,-40)"/>
      <ellipse rx="30" ry="15" fill="#c9a0a8" transform="rotate(236) translate(0,-40)"/>
      <ellipse rx="30" ry="15" fill="#ddb8be" transform="rotate(308) translate(0,-40)"/>
      <circle r="12" fill="#f0dde0"/>
    </g>
    <g opacity="0.05" transform="translate(180,620)">
      <ellipse rx="18" ry="9" fill="#ddb8be" transform="rotate(10) translate(0,-25)"/>
      <ellipse rx="18" ry="9" fill="#ddb8be" transform="rotate(82) translate(0,-25)"/>
      <ellipse rx="18" ry="9" fill="#c9a0a8" transform="rotate(154) translate(0,-25)"/>
      <ellipse rx="18" ry="9" fill="#c9a0a8" transform="rotate(226) translate(0,-25)"/>
      <ellipse rx="18" ry="9" fill="#ddb8be" transform="rotate(298) translate(0,-25)"/>
      <circle r="7" fill="#f0dde0"/>
    </g>
    <text x="200" y="400" font-family="serif" font-size="80" fill="#A8BDB2" opacity="0.04"
      text-anchor="middle" dominant-baseline="middle" letter-spacing="12">가만히</text>
  </svg>
</div>

<canvas id="petal-canvas"></canvas>

<!-- CONNECT FLASH -->
<div id="connect-flash"><div id="connect-flash-text">연결됨 · verbonden</div></div>

<!-- LOBBY -->
<div class="screen" id="lobby">
  <div class="lobby-title">가만히</div>
  <div class="lobby-sub">gamanhi · stil blijven</div>

  <div class="orb-small">
    <div class="orb-small-ring"></div>
    <div class="orb-small-fill"></div>
    <div class="orb-small-core"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-new">nieuwe sessie</button>
    <button class="btn btn-secondary" id="btn-join">sessie joinen</button>
  </div>
</div>

<!-- HOST: WAITING -->
<div class="screen hidden" id="screen-host">
  <div class="wordmark">가만히</div>
  <div class="status-line">deel deze code<br>met de ander</div>
  <div class="code-display" id="host-code">····</div>
  <div class="status-line" id="host-status">wachten op verbinding…</div>
  <span class="back-link" id="back-from-host">← terug</span>
</div>

<!-- JOIN: ENTER CODE -->
<div class="screen hidden" id="screen-join">
  <div class="wordmark">가만히</div>
  <div class="status-line">voer de code in<br>van de ander</div>
  <input id="code-input" type="text" maxlength="4" placeholder="····" autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="btn btn-primary" id="btn-connect" style="max-width:200px;width:100%;">verbinden</button>
  <span class="back-link" id="back-from-join">← terug</span>
</div>

<!-- PLAY -->
<div class="screen hidden" id="play">
  <div id="play-header">
    <div class="play-wordmark">가만히</div>
    <div class="session-code" id="play-code"></div>
  </div>

  <div id="orb-wrap">
    <div id="orb-dashed"></div>
    <div id="orb-outer-ring"></div>
    <div id="orb-mid-layer"></div>
    <div id="sync-ring"></div>
    <div id="orb-body">
      <div id="orb-core-glow"></div>
      <div id="orb-inner">
        <div id="orb-center-dot"></div>
      </div>
      <div id="orb-blossom">
        <svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(45,45)">
            <ellipse rx="16" ry="8" fill="#f0e0e3" stroke="#ddb8be" stroke-width="0.6" transform="rotate(0) translate(0,-22)"/>
            <ellipse rx="16" ry="8" fill="#f0e0e3" stroke="#ddb8be" stroke-width="0.6" transform="rotate(72) translate(0,-22)"/>
            <ellipse rx="16" ry="8" fill="#e8d0d4" stroke="#ddb8be" stroke-width="0.6" transform="rotate(144) translate(0,-22)"/>
            <ellipse rx="16" ry="8" fill="#e8d0d4" stroke="#ddb8be" stroke-width="0.6" transform="rotate(216) translate(0,-22)"/>
            <ellipse rx="16" ry="8" fill="#f0e0e3" stroke="#ddb8be" stroke-width="0.6" transform="rotate(288) translate(0,-22)"/>
            <circle r="7" fill="#f7f0f2" stroke="#ddb8be" stroke-width="0.5"/>
            <circle r="2.5" fill="#c9a0a8" opacity="0.6"/>
          </g>
        </svg>
      </div>
    </div>

    <div id="touch-left">
      <div class="touch-hint-circle" id="hint-left">jij</div>
    </div>
    <div id="touch-right">
      <div class="touch-hint-circle" id="hint-right">zij</div>
    </div>
  </div>

  <div id="play-footer">
    <div id="sync-word"></div>
    <div id="play-msg">leg je vinger neer<br>en voel het ritme</div>
    <div id="player-dots">
      <div class="pdot online" id="dot-me"></div>
      <div class="pdot-sep"></div>
      <div class="pdot" id="dot-them"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
// PASTE YOUR ABLY API KEY HERE:
const ABLY_KEY = 'JOUW_ABLY_API_KEY_HIER';
// ────────────────────────────────────────────────────────────────

const PERIOD  = 7200;
const INHALE  = 0.42;

// ── STATE ────────────────────────────────────────────────────────
let ably, channel;
let sessionCode = '';
let myRole = '';          // 'host' | 'guest'
let meHolding    = false;
let themHolding  = false;
let t0 = Date.now();
let animRaf;
let petals = [];

// ── ELEMENTS ─────────────────────────────────────────────────────
const screens     = document.querySelectorAll('.screen');
const lobbyEl     = document.getElementById('lobby');
const hostEl      = document.getElementById('screen-host');
const joinEl      = document.getElementById('screen-join');
const playEl      = document.getElementById('play');
const hostCodeEl  = document.getElementById('host-code');
const hostStatus  = document.getElementById('host-status');
const codeInput   = document.getElementById('code-input');
const playCodeEl  = document.getElementById('play-code');
const playMsg     = document.getElementById('play-msg');
const syncWord    = document.getElementById('sync-word');

const orbBody     = document.getElementById('orb-body');
const orbInner    = document.getElementById('orb-inner');
const orbGlow     = document.getElementById('orb-core-glow');
const orbBlossom  = document.getElementById('orb-blossom');
const syncRing    = document.getElementById('sync-ring');
const orbDashed   = document.getElementById('orb-dashed');
const orbOuter    = document.getElementById('orb-outer-ring');
const orbMid      = document.getElementById('orb-mid-layer');

const hintLeft    = document.getElementById('hint-left');
const hintRight   = document.getElementById('hint-right');
const dotMe       = document.getElementById('dot-me');
const dotThem     = document.getElementById('dot-them');

const flash       = document.getElementById('connect-flash');
const canvas      = document.getElementById('petal-canvas');
const ctx         = canvas.getContext('2d');

// ── NAVIGATION ───────────────────────────────────────────────────
function showScreen(el) {
  screens.forEach(s => s.classList.add('hidden'));
  el.classList.remove('hidden');
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

document.getElementById('btn-new').addEventListener('click', () => {
  sessionCode = genCode();
  myRole = 'host';
  hostCodeEl.textContent = sessionCode;
  hostStatus.textContent = 'wachten op verbinding…';
  showScreen(hostEl);
  connectAbly();
});

document.getElementById('btn-join').addEventListener('click', () => {
  myRole = 'guest';
  showScreen(joinEl);
  codeInput.value = '';
  setTimeout(() => codeInput.focus(), 100);
});

document.getElementById('btn-connect').addEventListener('click', joinSession);
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinSession(); });
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z]/g,'');
});

document.getElementById('back-from-host').addEventListener('click', () => {
  disconnectAbly(); showScreen(lobbyEl);
});
document.getElementById('back-from-join').addEventListener('click', () => showScreen(lobbyEl));

function joinSession() {
  const v = codeInput.value.trim().toUpperCase();
  if (v.length !== 4) return;
  sessionCode = v;
  showScreen(hostEl);
  hostCodeEl.textContent = sessionCode;
  hostStatus.textContent = 'verbinden…';
  connectAbly();
}

// ── ABLY ─────────────────────────────────────────────────────────
function connectAbly() {
  if (ably) { try { ably.close(); } catch(e){} }

  ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myRole + '_' + Date.now() });
  channel = ably.channels.get('gamanhi-' + sessionCode);

  ably.connection.on('connected', () => {
    channel.subscribe('state', onRemoteState);
    channel.subscribe('ping', onPing);

    if (myRole === 'guest') {
      channel.publish('ping', { role: 'guest' });
    }
  });

  ably.connection.on('failed', () => {
    hostStatus.textContent = 'verbinding mislukt. controleer je API key.';
  });
}

function onPing(msg) {
  if (myRole === 'host' && msg.data.role === 'guest') {
    channel.publish('ping', { role: 'host' });
    showConnected();
  } else if (myRole === 'guest' && msg.data.role === 'host') {
    showConnected();
  }
}

function showConnected() {
  flash.style.opacity = '1';
  flash.style.transition = 'opacity 0.4s ease';
  setTimeout(() => {
    flash.style.opacity = '0';
    flash.style.transition = 'opacity 1s ease';
  }, 1200);

  t0 = Date.now();
  playCodeEl.textContent = sessionCode;
  showScreen(playEl);
  dotThem.classList.add('online');
  startAnim();
  if (navigator.vibrate) navigator.vibrate([30, 60, 30]);
}

function onRemoteState(msg) {
  themHolding = msg.data.holding === true;
  dotThem.classList.toggle('holding', themHolding);
  updateHints();
}

function publishState() {
  if (!channel) return;
  channel.publish('state', { holding: meHolding });
}

function disconnectAbly() {
  if (ably) { try { ably.close(); } catch(e){} ably = null; channel = null; }
  cancelAnimationFrame(animRaf);
}

// ── TOUCH ────────────────────────────────────────────────────────
const orbWrap = document.getElementById('orb-wrap');
let myTouchId = null;

orbWrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!meHolding) {
    meHolding = true;
    myTouchId = e.changedTouches[0].identifier;
    dotMe.classList.add('holding');
    updateHints();
    publishState();
    if (navigator.vibrate) navigator.vibrate(20);
  }
}, { passive:false });

orbWrap.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === myTouchId) {
      meHolding = false;
      myTouchId = null;
      dotMe.classList.remove('holding');
      updateHints();
      publishState();
    }
  }
}, { passive:false });

orbWrap.addEventListener('touchcancel', e => {
  meHolding = false; myTouchId = null;
  dotMe.classList.remove('holding');
  updateHints();
  publishState();
}, { passive:false });

function updateHints() {
  hintLeft.classList.toggle('active', meHolding);
  hintRight.classList.toggle('active', themHolding);
}

// ── ANIMATION ────────────────────────────────────────────────────
function breathState(t) {
  const c = t % PERIOD;
  const end = PERIOD * INHALE;
  if (c < end) return { phase:'in', p: c / end };
  return { phase:'out', p: (c - end) / (PERIOD - end) };
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#',''), 16);
  const bh = parseInt(b.replace('#',''), 16);
  const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
  const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

let lastPhase = '';

function startAnim() {
  resizeCanvas();
  function tick() {
    const now = Date.now();
    const t = now - t0;
    const { phase, p } = breathState(t);
    const both = meHolding && themHolding;

    if (phase !== lastPhase) {
      lastPhase = phase;
      if (both && navigator.vibrate) {
        navigator.vibrate(phase === 'out' ? [35] : [18]);
      }
    }

    const breathScale = phase === 'in' ? 1 + p*0.12 : 1.12 - p*0.12;
    const innerScale  = phase === 'in' ? 1 + p*0.07 : 1.07 - p*0.07;
    orbBody.style.transform  = `scale(${breathScale.toFixed(4)})`;
    orbInner.style.transform = `scale(${innerScale.toFixed(4)})`;

    if (both) {
      const sync = phase === 'out' ? Math.round(68 + p*30) : Math.round(98 - p*30);
      const g = Math.min(1, (sync - 60) / 38);

      orbBody.style.background  = lerpColor('#c8d8d0','#8db8ae', g);
      orbInner.style.background = lerpColor('#7da89a','#4e7d72', g);
      orbGlow.style.opacity     = (g * 0.35).toFixed(2);
      orbBlossom.style.opacity  = g > 0.65 ? ((g-0.65)/0.35).toFixed(2) : '0';

      orbOuter.style.opacity    = (0.3 + g*0.4).toFixed(2);
      orbMid.style.opacity      = (0.12 + g*0.18).toFixed(2);

      syncRing.style.opacity     = (g * 0.6).toFixed(2);
      syncRing.style.borderWidth = Math.round(g * 5) + 'px';

      syncWord.style.opacity = '1';
      syncWord.textContent = sync > 90 ? '하나 · één' : sync > 75 ? '함께 · samen' : '···';

      if (phase === 'out') {
        playMsg.textContent = 'laat samen los';
        hintLeft.textContent  = '숨';
        hintRight.textContent = '숨';
      } else {
        playMsg.textContent = 'adem in, samen';
        hintLeft.textContent  = '·';
        hintRight.textContent = '·';
      }
      playMsg.style.opacity = '0.72';

      if (g > 0.82 && Math.random() < 0.04) spawnPetal();

    } else {
      orbBody.style.background  = '#c8d8d0';
      orbInner.style.background = '#7da89a';
      orbGlow.style.opacity     = '0';
      orbBlossom.style.opacity  = '0';
      syncRing.style.borderWidth = '0px';
      syncRing.style.opacity    = '0';
      orbOuter.style.opacity    = '0.3';
      orbMid.style.opacity      = '0.12';
      syncWord.style.opacity    = '0';
      hintLeft.textContent  = 'jij';
      hintRight.textContent = 'zij';

      if (!meHolding && !themHolding) {
        playMsg.textContent = 'leg je vinger neer\nen voel het ritme';
        playMsg.style.opacity = '0.38';
      } else if (meHolding && !themHolding) {
        playMsg.textContent = 'jij bent er · wacht\nop de ander';
        playMsg.style.opacity = '0.55';
      } else {
        playMsg.textContent = 'de ander is er · kom\nsamen in het ritme';
        playMsg.style.opacity = '0.55';
      }
    }

    tickPetals();
    animRaf = requestAnimationFrame(tick);
  }
  animRaf = requestAnimationFrame(tick);
}

// ── PETALS ───────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

function spawnPetal() {
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.42;
  const a  = Math.random() * Math.PI * 2;
  const r  = 80 + Math.random() * 50;
  petals.push({
    x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r,
    vx: (Math.random()-0.5)*0.7,
    vy: -(0.35 + Math.random()*0.55),
    rot: Math.random()*Math.PI*2,
    vrot: (Math.random()-0.5)*0.025,
    w: 7 + Math.random()*6, h: 4 + Math.random()*3,
    life: 0, max: 140 + Math.random()*80,
    col: Math.random()>0.5 ? '#ddb8be' : '#c9a0a8',
  });
}

function tickPetals() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals = petals.filter(p => p.life < p.max);
  for (const p of petals) {
    p.x += p.vx; p.y += p.vy;
    p.rot += p.vrot; p.life++;
    const progress = p.life / p.max;
    p.alpha = progress < 0.15
      ? progress/0.15*0.65
      : 0.65*(1-((progress-0.15)/0.85));
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.w*0.5, p.h, 0, 0, Math.PI*2);
    ctx.fillStyle = p.col;
    ctx.fill();
    ctx.restore();
  }
}
